<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#b8752e">
<title>心屿 · 多人对话记录</title>
<style>
:root{
  --cream:#fdf6ed;--wheat:#f5e6d3;--sand:#e8d5b7;--bronze:#c4a882;
  --bark:#8b7355;--earth:#6b5a4a;--deep:#4a3728;--gold:#c8963e;
  --amber:#b8752e;--warm:#d4a24e;--soft:#e0c9a6;--card:rgba(255,252,247,.88);
  --shadow:0 14px 34px rgba(74,55,40,.08);
}
*{box-sizing:border-box;margin:0;padding:0;letter-spacing:0}
html,body{min-height:100%;background:linear-gradient(175deg,var(--cream) 0%,var(--wheat) 44%,var(--sand) 100%);color:var(--earth)}
body{font-family:"SimSun","宋体","Songti SC",serif;overflow:hidden}
button{font:inherit}
.app{height:100vh;height:100dvh;display:grid;grid-template-rows:auto 1fr;gap:12px;padding:18px 14px 16px;overflow:hidden}
.header{text-align:center;flex-shrink:0}
.tag{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--bronze);margin-bottom:6px}
h1{font-size:30px;line-height:1.05;font-weight:700;color:var(--deep);letter-spacing:3px}
.sub{font-size:12px;color:var(--bark);margin-top:5px;font-weight:300}
.divider{width:40px;height:1px;background:var(--bronze);margin:8px auto;opacity:.5}
.shell{width:min(1120px,100%);height:100%;margin:0 auto;display:grid;grid-template-columns:minmax(340px,1fr) minmax(300px,.78fr);gap:14px;min-height:0}
.card{position:relative;overflow:hidden;background:var(--card);border:1px solid rgba(255,255,255,.7);border-radius:28px;box-shadow:var(--shadow);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.card::after{content:"";position:absolute;top:-44px;right:-42px;width:118px;height:118px;border-radius:50%;background:radial-gradient(circle,rgba(200,150,62,.08),transparent 70%);pointer-events:none}
.conversation-card{display:grid;grid-template-rows:auto auto 1fr auto;min-height:0;padding:16px 14px}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;position:relative;z-index:1}
.kicker{font-size:10px;color:var(--bronze);letter-spacing:2px}
.status{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:var(--amber);white-space:nowrap}
.status::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gold);animation:blink 1.6s infinite}
.source-lines{position:relative;z-index:1}
.conversation-line{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(200,168,130,.12)}
.conversation-line:last-child{border-bottom:none}
.conversation-avatar{width:30px;height:30px;border-radius:50%;background:rgba(200,150,62,.14);display:flex;align-items:center;justify-content:center;color:var(--amber);font-size:14px;flex-shrink:0}
.conversation-meta{font-size:10px;color:var(--bronze);margin-bottom:2px}
.conversation-text{font-size:12px;color:var(--bark);line-height:1.65;font-weight:300}
.timeline{position:relative;z-index:1;min-height:0;overflow:auto;margin:8px -2px 0;padding:2px 2px 10px;scrollbar-width:thin}
.turn{display:grid;grid-template-columns:42px 1fr;gap:10px;margin:0 0 10px;opacity:0;transform:translateY(10px);animation:rise .32s ease forwards}
.time{font-size:11px;color:var(--bronze);padding-top:9px;text-align:right;font-variant-numeric:tabular-nums}
.bubble{border:1px solid rgba(200,168,130,.14);background:rgba(255,252,247,.64);border-radius:18px;padding:10px 12px;box-shadow:0 6px 18px rgba(74,55,40,.045)}
.bubble.s1{border-bottom-left-radius:6px}
.bubble.s2{background:rgba(245,230,211,.52);border-bottom-right-radius:6px}
.speaker{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.speaker-name{font-size:12px;font-weight:700;color:var(--deep)}
.speaker-pos{font-size:10px;color:var(--bronze)}
.text{font-size:14px;color:var(--bark);line-height:1.82;font-weight:300}
.cursor{display:inline-block;width:7px;height:1em;margin-left:2px;background:rgba(184,117,46,.55);vertical-align:-2px;animation:blink .9s steps(2,end) infinite}
.controls{display:flex;justify-content:center;gap:8px;padding-top:8px;position:relative;z-index:1}
.btn-sm{border:none;border-radius:18px;padding:8px 18px;font-size:12px;color:#fff;background:var(--amber);box-shadow:0 3px 12px rgba(184,117,46,.2);cursor:pointer;transition:transform .2s ease,opacity .2s ease}
.btn-sm.secondary{color:var(--bark);background:rgba(255,252,247,.74);border:1px solid rgba(200,168,130,.2);box-shadow:none}
.btn-sm:active{transform:scale(.98)}
.summary-card{display:grid;grid-template-rows:auto 1fr;min-height:0;padding:18px 18px 20px}
.summary-title{font-size:16px;font-weight:700;color:var(--deep);letter-spacing:1px}
.summary-sub{font-size:11px;color:var(--bronze);margin-top:4px}
.summary-body{position:relative;z-index:1;min-height:0;overflow:auto;margin-top:14px;display:flex;flex-direction:column;gap:10px}
.summary-empty{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;font-size:12px;line-height:1.9;color:var(--bark);font-weight:300;padding:20px}
.summary-item{display:grid;grid-template-columns:30px 1fr;gap:10px;padding:12px;border:1px solid rgba(200,168,130,.14);border-radius:18px;background:rgba(255,252,247,.58);opacity:0;transform:translateY(8px);animation:rise .36s ease forwards}
.summary-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(200,150,62,.14);color:var(--amber);font-size:13px;font-weight:700}
.summary-label{font-size:12px;font-weight:700;color:var(--deep);margin-bottom:4px}
.summary-text{font-size:13px;line-height:1.78;color:var(--bark);font-weight:300}
.progress{height:3px;border-radius:999px;background:rgba(200,168,130,.2);overflow:hidden;margin-top:10px;position:relative;z-index:1}
.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--soft),var(--amber));transition:width .4s ease}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
@keyframes blink{50%{opacity:.22}}
@media (min-width:700px) and (min-height:860px){
  .app{padding:28px 34px 24px;gap:20px}
  h1{font-size:46px}.sub{font-size:16px}.tag{font-size:10px}
  .conversation-card{padding:28px 30px}
  .conversation-line{gap:18px;padding:15px 0}
  .conversation-avatar{width:44px;height:44px;font-size:19px}
  .conversation-meta{font-size:13px}.conversation-text{font-size:16px;line-height:1.9}
  .text{font-size:18px}.speaker-name{font-size:15px}.speaker-pos,.time{font-size:13px}
  .btn-sm{min-height:48px;padding:11px 24px;font-size:15px}
  .summary-card{padding:28px 30px}.summary-title{font-size:24px}.summary-text{font-size:16px}
}
@media (max-width:820px){
  body{overflow:auto}
  .app{height:auto;min-height:100vh;overflow:visible}
  .shell{grid-template-columns:1fr;height:auto}
  .conversation-card{min-height:62vh;max-height:none}
  .summary-card{min-height:360px}
}
@media (max-width:480px){
  .app{padding:16px 12px 14px}
  h1{font-size:28px}.shell{gap:12px}
  .conversation-card,.summary-card{border-radius:24px;padding:16px 14px}
  .turn{grid-template-columns:36px 1fr;gap:8px}
  .time{font-size:10px}.text{font-size:13px;line-height:1.78}
}
@media (min-width:900px) and (orientation:landscape){
  .app{padding:12px 34px 16px;gap:8px}
  h1{font-size:30px}.sub{font-size:12px}.divider{margin:5px auto}
  .conversation-card{padding:14px 16px}
  .conversation-line{padding:8px 0}.conversation-avatar{width:30px;height:30px;font-size:14px}
  .conversation-meta{font-size:10px}.conversation-text{font-size:12px;line-height:1.65}
  .text{font-size:13px;line-height:1.7}.bubble{padding:8px 10px}
  .btn-sm{min-height:34px;padding:6px 16px;font-size:11px}
  .summary-card{padding:14px 16px}.summary-body{gap:8px}.summary-item{padding:10px}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
}
</style>
</head>
<body>
<main class="app">
  <header class="header">
    <div class="tag">· XINYU ·</div>
    <h1>多人对话记录</h1>
    <div class="divider"></div>
    <p class="sub">实时记录，并在结束后生成会议总结</p>
  </header>

  <section class="shell" aria-label="心屿多人对话记录演示">
    <article class="card conversation-card" aria-label="实时对话记录">
      <div class="card-head">
        <div class="kicker">多人对话记录</div>
        <div class="status" id="recordState">准备播放</div>
      </div>

      <div class="source-lines">
        <div class="conversation-line">
          <div class="conversation-avatar">🎤</div>
          <div>
            <div class="conversation-meta" id="doaMeta">ReSpeaker 模拟已就绪</div>
            <div class="conversation-text" id="doaText">系统会根据说话人切换，模拟声源方向与说话状态。</div>
          </div>
        </div>
        <div class="conversation-line">
          <div class="conversation-avatar">✎</div>
          <div>
            <div class="conversation-meta" id="timelineMeta">对话时间线</div>
            <div class="conversation-text" id="timelineHint">打开页面后自动逐条生成转写记录。</div>
          </div>
        </div>
      </div>

      <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
      <div class="timeline" id="timeline" aria-live="polite"></div>

      <div class="controls">
        <button class="btn-sm secondary" type="button" id="skipBtn">直接总结</button>
      </div>
    </article>

    <aside class="card summary-card" aria-label="会议总结">
      <div>
        <div class="summary-title">会议总结</div>
        <div class="summary-sub" id="summaryState">记录完成后自动生成</div>
      </div>
      <div class="summary-body" id="summaryBody">
        <div class="summary-empty">心屿正在听。<br>等对话记录完成后，这里会整理背景、重点课题、改进方案与应用价值。</div>
      </div>
    </aside>
  </section>
</main>

<script>
const conversationTurns=[
  {time:"00:00",speaker:"说话人1",pos:"右侧",text:"最近我听说你在研究关于情感分析的课题，你都研究了些什么？"},
  {time:"00:08",speaker:"说话人2",pos:"正前方",text:"我最近比较关注的是多模态情感分析这个领域。它主要有比较细分的、比较吸引的四个赛道，一个是人际互动情感，一个是细粒度情感，一个是情感偏好分析，还有结合生理信号来进行分析。"},
  {time:"00:24",speaker:"说话人1",pos:"右侧",text:"嗯，那你能不能详细的去讲一下这四个赛道分别都是什么样子的呢？"},
  {time:"00:34",speaker:"说话人2",pos:"正前方",text:"那我先讲我最感兴趣的这个赛道，就是细粒度情感这个赛道。它的核心内容是超越了传统的这个六类的情感分类法，然后希望能够预测开放词汇细粒度情感标签。它所瞄准的一个核心的痛点是基础的情感标签它没有办法涵盖复杂的人类情感。它会导致分类出来的这个结果不够准确，然后不具有很高的可解释性，所以它希望能够开发出这样的一套新的逻辑来细化这一个情感分析的一个细粒度。主要的场景是在精确的情感交互、用户心理建模，还有复杂情绪分析这些方面。"},
  {time:"01:10",speaker:"说话人1",pos:"右侧",text:"所以你的意思就是这个细粒度是指原本它的分类是不够，就是太宽泛了，然后现在想研究出一种新的分类规则去让它更细一点。"},
  {time:"01:25",speaker:"说话人2",pos:"正前方",text:"是的是的，就是比如说有时候人的情感它在面上，表面上表现出来的情感其实是非常不一样的。我在苦笑的话，这个简单分析器可能会把我识别成是一种高兴的状态，但其实上从我的其他的一些，比如说我说的话，还有我的声调是可以体现出其实我是一个不是一个很开心的状态。所以它的这个赛道的目标就是通过把这多重模态结合起来，然后去更加立体，更加细致地去刻画人类的这种情感，而不是用一个简单的分类器来做出一个判断。"},
  {time:"02:08",speaker:"说话人1",pos:"右侧",text:"嗯，我觉得这非常有道理。"}
];
const summaryItems=[
  {label:"背景",text:"说话人2目前正在探索多模态情感分析领域，该领域包含四个细分赛道，分别是人际互动情感、细粒度情感、情感偏好分析，以及结合生理信号的分析。"},
  {label:"重点课题",text:"双方重点讨论了“细粒度情感”方向。传统情感分析常因标签分类过于宽泛，导致无法准确识别复杂的人类情绪。"},
  {label:"改进方案",text:"说话人2提出通过多模态（结合语音、语意、表情等）的方式，提升情感分析的准确度和可解释性，从而更立体地刻画用户的真实心理状态。"},
  {label:"应用价值",text:"该技术未来将应用于情感交互、用户心理建模及复杂情绪分析等场景。"}
];
const $=id=>document.getElementById(id);
let timers=[];
let playing=false;
function clearTimers(){timers.forEach(t=>clearTimeout(t));timers=[]}
function escapeHTML(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
function setStatus(text){$("recordState").textContent=text}
function updateProgress(done){$("progressBar").style.width=Math.round(done/conversationTurns.length*100)+"%"}
function addTurn(turn,index,instant=false){
  const node=document.createElement("div");
  const cls=turn.speaker==="说话人1"?"s1":"s2";
  node.className="turn";
  node.innerHTML=`<div class="time">${turn.time}</div><div class="bubble ${cls}"><div class="speaker"><span class="speaker-name">${turn.speaker}</span><span class="speaker-pos">${turn.pos}</span></div><div class="text"></div></div>`;
  $("timeline").appendChild(node);
  $("doaMeta").textContent=`${turn.pos} · ${turn.speaker} 正在说话`;
  $("doaText").textContent=`已捕捉 ${turn.speaker} 的语音片段，正在写入时间线。`;
  $("timelineMeta").textContent=`已记录 ${index+1}/${conversationTurns.length} 条`;
  $("timelineHint").textContent=`最新片段：${turn.time} · ${turn.speaker}`;
  updateProgress(index+1);
  const textEl=node.querySelector(".text");
  if(instant){
    textEl.textContent=turn.text;
    return;
  }
  typeText(textEl,turn.text);
  node.scrollIntoView({block:"end",behavior:"smooth"});
}
function typeText(el,text){
  const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(reduce){el.textContent=text;return}
  let i=0;
  const cursor=document.createElement("span");
  cursor.className="cursor";
  el.appendChild(cursor);
  const tick=()=>{
    el.insertBefore(document.createTextNode(text.slice(i,i+2)),cursor);
    i+=2;
    if(i<text.length){
      timers.push(setTimeout(tick,18));
    }else{
      cursor.remove();
    }
  };
  tick();
}
function renderSummary(){
  $("summaryState").textContent="已生成";
  $("summaryBody").innerHTML="";
  summaryItems.forEach((item,i)=>{
    const node=document.createElement("div");
    node.className="summary-item";
    node.style.animationDelay=`${i*90}ms`;
    node.innerHTML=`<div class="summary-icon">${i+1}</div><div><div class="summary-label">${escapeHTML(item.label)}</div><div class="summary-text">${escapeHTML(item.text)}</div></div>`;
    $("summaryBody").appendChild(node);
  });
}
function reset(){
  clearTimers();
  playing=true;
  $("timeline").innerHTML="";
  $("summaryBody").innerHTML='<div class="summary-empty">心屿正在听。<br>等对话记录完成后，这里会整理背景、重点课题、改进方案与应用价值。</div>';
  $("summaryState").textContent="记录完成后自动生成";
  $("timelineMeta").textContent="对话时间线";
  $("timelineHint").textContent="打开页面后自动逐条生成转写记录。";
  $("doaMeta").textContent="ReSpeaker 模拟已就绪";
  $("doaText").textContent="系统会根据说话人切换，模拟声源方向与说话状态。";
  updateProgress(0);
}
function play(){
  reset();
  setStatus("正在记录");
  const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  let delay=reduce?0:420;
  conversationTurns.forEach((turn,index)=>{
    timers.push(setTimeout(()=>addTurn(turn,index,reduce),delay));
    delay+=reduce?0:Math.min(2600,1000+turn.text.length*22);
  });
  timers.push(setTimeout(()=>{
    playing=false;
    setStatus("记录完成");
    $("doaMeta").textContent="多人记录已完成";
    $("doaText").textContent="声源与转写片段已整理，正在生成总结。";
    renderSummary();
  },delay+(reduce?0:360)));
}
function skip(){
  reset();
  setStatus("记录完成");
  conversationTurns.forEach((turn,index)=>addTurn(turn,index,true));
  $("doaMeta").textContent="多人记录已完成";
  $("doaText").textContent="声源与转写片段已整理，已生成总结。";
  renderSummary();
}
$("skipBtn").addEventListener("click",skip);
window.addEventListener("load",()=>timers.push(setTimeout(play,260)));
</script>
</body>
</html>
