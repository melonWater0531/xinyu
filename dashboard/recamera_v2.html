<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>reCamera Dashboard</title>
<style>
:root{--bg:#f0f4f8;--panel:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--blue:#3b82f6;--green:#16a34a;--red:#dc2626;--amber:#d97706;--purple:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"SimSun","宋体",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--panel);border-bottom:1px solid var(--border);font-size:12px;flex-shrink:0;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.g{background:var(--green)}.dot.r{background:var(--red)}
.main{flex:1;display:grid;grid-template-columns:1fr 320px;gap:0;min-height:0;overflow:hidden}
.left{position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
.left img{position:absolute;width:100%;height:100%;object-fit:contain}
.left canvas{position:absolute;top:0;left:0;pointer-events:none}
.right{display:flex;flex-direction:column;gap:8px;padding:8px;overflow-y:auto;background:var(--bg)}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.panel h3{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:1px}
.btn-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.btn{padding:6px 12px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:#fff}
.btn-sleep{background:#94a3b8}.btn-standby{background:#93c5fd;color:#1e40af}
.btn-stop{background:#fca5a5;color:#991b1b}.btn-cam{background:#86efac;color:#166534}
.btn-align{background:#a5f3fc;color:#155e75}.btn-face{background:#c4b5fd;color:#5b21b6}
.slider-row{display:flex;align-items:center;gap:6px;margin:3px 0}
.slider-row span{font-size:10px;color:var(--muted);width:32px}
.slider-row input{flex:1;height:4px;-webkit-appearance:none;background:#e2e8f0;border-radius:2px;outline:none}
.slider-row input::-webkit-slider-thumb{width:14px;height:14px;border-radius:50%;background:var(--blue);cursor:pointer;-webkit-appearance:none}
.slider-row .val{font-size:11px;font-weight:600;width:42px;text-align:right}
.row{display:flex;justify-content:space-between;padding:2px 0;font-size:11px}
.row .l{color:var(--muted)}.row .v{color:var(--text);font-weight:600}
.bar-wrap{height:3px;background:#f1f5f9;border-radius:2px;margin:1px 0 4px}
.bar-fill{height:3px;border-radius:2px;background:var(--purple);transition:width .5s}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.bg-g{background:#dcfce7;color:#15803d}.bg-y{background:#fef9c3;color:#a16207}.bg-r{background:#fef2f2;color:#dc2626}
</style></head><body>
<div class="topbar">
  <span class="dot r" id="connDot"></span>
  <span style="font-size:11px;color:var(--muted)" id="connText">等待连接</span>
  <span style="flex:1"></span>
  <span style="font-size:10px;color:var(--muted)" id="fpsText"></span>
</div>
<div class="main">
<div class="left">
  <img id="camImg" src="" alt="Camera">
  <canvas id="camCv"></canvas>
</div>
<div class="right">
  <!-- Controls -->
  <div class="panel">
    <div class="btn-row">
      <button class="btn btn-sleep" onclick="cmd('sleep')">💤</button>
      <button class="btn btn-standby" onclick="cmd('standby')">⏸</button>
      <button class="btn btn-align" onclick="autoAlign()">🎯 对准</button>
      <button class="btn btn-face" onclick="cmd('face_track')">👤 追踪</button>
      <button class="btn btn-stop" onclick="cmd('stop')">🛑</button>
    </div>
    <div class="slider-row"><span>Yaw</span><input type="range" id="yawS" min="0" max="360" value="180" oninput="onSlide('yaw')"><span class="val" id="yawV">180°</span></div>
    <div class="slider-row"><span>Pitch</span><input type="range" id="pitchS" min="0" max="180" value="90" oninput="onSlide('pitch')"><span class="val" id="pitchV">90°</span></div>
    <div class="slider-row"><span>Speed</span><input type="range" id="speedS" min="0" max="720" step="10" value="360" oninput="onSlide('speed')"><span class="val" id="speedV">360</span></div>
  </div>
  <!-- Attention -->
  <div class="panel"><h3>🧠 专注度</h3>
    <div class="badge bg-y" id="attnBadge">--</div>
    <div style="font-size:28px;font-weight:700;color:var(--text)" id="attnScore">--</div>
    <div style="font-size:10px;color:var(--muted)" id="attnDur"></div>
  </div>
  <!-- Emotion -->
  <div class="panel"><h3>😶 情绪</h3>
    <div style="font-size:24px;text-align:center" id="emojiBig">🌸</div>
    <div style="text-align:center;font-size:14px;font-weight:600;color:var(--text)" id="emoLabel">--</div>
    <div id="emoBars" style="margin-top:6px"></div>
  </div>
</div>
</div>

<script>
const $=id=>document.getElementById(id);
const L=['Anger','Contempt','Disgust','Fear','Happiness','Neutral','Sadness','Surprise'];
const ZH={Anger:'愤怒',Contempt:'轻蔑',Disgust:'不适',Fear:'不安',Happiness:'快乐',Neutral:'平静',Sadness:'低落',Surprise:'惊讶'};

let camOn=false,fetching=false,alignRunning=false;
let camImg=$('camImg'),camCv=$('camCv'),ctx=camCv.getContext('2d');

async function api(m,p,b){
  try{const o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);const r=await fetch(p,o);return r.ok?await r.json():null}catch(e){return null}
}

function cmd(a){
  if(a==='sleep')api('POST','/api/gimbal/sleep');
  else if(a==='standby')api('POST','/api/gimbal/standby');
  else if(a==='stop')api('POST','/api/gimbal/stop');
  else if(a==='face_track')api('POST','/api/face_track/start');
}

async function autoAlign(){
  if(alignRunning)return;alignRunning=true;
  const r=await api('POST','/api/auto_align');
  alignRunning=false;
}

// Sliders
let slideTimers={};
function onSlide(t){
  const v=+($(t+'S').value);$(t+'V').textContent=v+(t==='speed'?'':'°');
  clearTimeout(slideTimers[t]);slideTimers[t]=setTimeout(async()=>{
    if(t==='yaw')await api('POST','/api/gimbal/yaw',{angle:v});
    else if(t==='pitch')await api('POST','/api/gimbal/pitch',{angle:v});
    else await api('POST','/api/gimbal/speed',{speed:v});
  },100);
}

async function poll(){
  if(fetching)return;fetching=true;
  try{
    const r=await fetch('/api/state');if(!r.ok){fetching=false;return}
    const d=await r.json();if(d.type!=='state_snapshot'){fetching=false;return}
    const s=d.data;

    // Connection
    const ok=s.video.connected;
    document.getElementById('connDot').className='dot '+(ok?'g':'r');
    document.getElementById('connText').textContent=ok?'已连接':'等待连接';
    document.getElementById('fpsText').textContent=(s.video.fps||0).toFixed(1)+' FPS';
    // Camera
    if(ok&&!camOn){camOn=true;camImg.src='/video_feed?t='+Date.now()}

    // Gimbal sliders sync
    const g=s.gimbal;
    if(!slideTimers['yaw'])$('yawS').value=Math.round(g.yaw_target||180),$('yawV').textContent=Math.round(g.yaw_target||180)+'°';
    if(!slideTimers['pitch'])$('pitchS').value=Math.round(g.pitch_target||90),$('pitchV').textContent=Math.round(g.pitch_target||90)+'°';
    if(!slideTimers['speed'])$('speedS').value=g.speed||360,$('speedV').textContent=(g.speed||360);

    // Attention (text-only, no score)
    const a=s.attention;
    if(a&&a.has_face&&a.score!=null){
      let lvl,cls,desc;
      if(a.score>=70){lvl='✦ 专注';cls='bg-g';desc='眼睛睁开，头朝前方，注意力集中'}
      else if(a.score>=40){lvl='◇ 微澜';cls='bg-y';desc='头微偏或眨眼略多，稍有分心'}
      else{lvl='○ 飘远';cls='bg-r';desc='头部偏离或眼睛半闭，注意力分散'}
      document.getElementById('attnBadge').textContent=lvl;document.getElementById('attnBadge').className='badge '+cls;
      document.getElementById('attnScore').textContent=desc;
    }else{
      document.getElementById('attnBadge').textContent='等待';document.getElementById('attnBadge').className='badge bg-y';
      document.getElementById('attnScore').textContent='请正对摄像头';
    }

    // Emotion
    const e=s.emotieff;
    if(e&&e.emotion&&e.probabilities){
      const icons={Anger:'😠',Contempt:'😏',Disgust:'🤢',Fear:'😨',Happiness:'😊',Neutral:'😐',Sadness:'😢',Surprise:'😲'};
      document.getElementById('emojiBig').textContent=icons[e.emotion]||'🌸';
      document.getElementById('emoLabel').textContent=ZH[e.emotion]||e.emotion;
      document.getElementById('emoBars').innerHTML=L.map(l=>{
        const p=e.probabilities[l]||0;const w=Math.round(p*100);const is=l===e.emotion;
        return '<div class="row"><span class="l">'+ZH[l]+'</span><span class="v">'+w+'%</span></div><div class="bar-wrap"><div class="bar-fill" style="width:'+w+'%;opacity:'+(is?1:.3)+'"></div></div>';
      }).join('');
    }

    // Canvas overlay: detection boxes + keypoints
    if(camImg.clientWidth){
      const iw=camImg.clientWidth,ih=camImg.clientHeight;
      camCv.width=iw;camCv.height=ih;ctx.clearRect(0,0,iw,ih);
      const sc=Math.min(iw/640,ih/640);const rw=640*sc,rh=640*sc;const ox=(iw-rw)/2,oy=(ih-rh)/2;
      const mx=x=>ox+x/640*rw,my=y=>oy+y/640*rh;

      // Detection boxes
      (s.video.detections||[]).forEach(d=>{
        ctx.strokeStyle='#22c55e';ctx.lineWidth=2;ctx.strokeRect(mx(d.x),my(d.y),mx(d.x+d.w)-mx(d.x),my(d.y+d.h)-my(d.y));
        ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.fillText(d.class_name+' '+(d.confidence*100).toFixed(0)+'%',mx(d.x)+2,my(d.y)-4);
      });
      // Pose keypoints
      (s.pose.persons||[]).forEach((p,i)=>{
        const clr=['#22c55e','#3b82f6','#f59e0b'][i%3];
        (p.keypoints||[]).forEach(kp=>{ctx.beginPath();ctx.arc(mx(kp.x),my(kp.y),3,0,Math.PI*2);ctx.fillStyle=clr;ctx.fill()});
      });
      // MediaPipe eye landmarks
      const mp=s.mp_face||{};
      if(mp.success&&mp.landmarks_eye){(mp.landmarks_eye||[]).forEach((pt,i)=>{ctx.beginPath();ctx.arc(mx(pt[0]),my(pt[1]),i<6?2.5:2,0,Math.PI*2);ctx.fillStyle=i<6?'#8b5cf6':'#ec4899';ctx.fill()})}
    }
  }catch(e){}fetching=false;
}
poll();setInterval(poll,2000);
</script></body></html>
