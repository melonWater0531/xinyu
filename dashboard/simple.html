<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>心屿</title>
<style>
:root{--cream:#fdf6ed;--wheat:#f5e6d3;--bronze:#c4a882;--bark:#8b7355;--deep:#4a3728;--amber:#b8752e;--card:rgba(255,252,247,.92);--shadow:0 2px 16px rgba(74,55,40,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:linear-gradient(175deg,var(--cream),var(--wheat),#e8d5b7);color:var(--deep);min-height:100vh;display:flex;justify-content:center;padding:24px 16px}
.c{max-width:420px;width:100%;display:flex;flex-direction:column;gap:16px}
.card{background:var(--card);border-radius:20px;padding:20px;box-shadow:var(--shadow);border:1px solid rgba(200,168,130,.15)}
h1{text-align:center;font-size:28px;font-weight:300;letter-spacing:3px;color:var(--deep)}
.tag{text-align:center;font-size:10px;letter-spacing:4px;color:var(--bronze)}
.badge{display:inline-block;padding:6px 18px;border-radius:20px;font-size:18px;font-weight:600;letter-spacing:2px}
.bg-hi{background:rgba(200,150,62,.2);color:var(--amber)}
.bg-md{background:rgba(180,160,130,.18);color:var(--bark)}
.bg-lo{background:rgba(180,140,110,.16);color:#a0724a}
.row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:var(--bark)}
.bar{height:4px;border-radius:2px;background:var(--amber);transition:width .5s}
.emoji{font-size:48px;text-align:center}
.emolabel{font-size:20px;text-align:center;color:var(--deep)}
.emotag{font-size:12px;text-align:center;color:var(--bark);font-style:italic}
.mini{font-size:10px;color:var(--bronze);text-align:center;margin-top:4px}
</style></head><body>
<div class="c">
  <div class="tag">· XINYU ·</div>
  <h1>心屿</h1>
  <div class="mini" id="status">连接中...</div>

  <div class="card" style="text-align:center">
    <div class="badge bg-md" id="attnBadge">--</div>
    <div style="font-size:13px;color:var(--bark);margin-top:8px" id="attnTag"></div>
    <div style="font-size:36px;font-weight:300;color:var(--deep);margin-top:8px" id="attnScore"></div>
    <div class="mini" id="attnDur"></div>
  </div>

  <div class="card">
    <div class="emoji" id="emoji">🌸</div>
    <div class="emolabel" id="emolabel">--</div>
    <div class="emotag" id="emotag"></div>
    <div id="bars" style="margin-top:10px"></div>
  </div>

  <div class="mini" id="debug"></div>
</div>

<script>
const $=id=>document.getElementById(id);
const LABELS=['Anger','Contempt','Disgust','Fear','Happiness','Neutral','Sadness','Surprise'];
const ZH={Anger:'愤怒',Contempt:'轻蔑',Disgust:'不适',Fear:'不安',Happiness:'快乐',Neutral:'平静',Sadness:'低落',Surprise:'惊讶'};
const EMOJI={Anger:'😠',Contempt:'😏',Disgust:'🤢',Fear:'😨',Happiness:'😊',Neutral:'😐',Sadness:'😢',Surprise:'😲'};

let focusStart=null;

async function poll(){
  try{
    const r=await fetch('/api/state');if(!r.ok)return;
    const d=await r.json();if(d.type!=='state_snapshot')return;
    const s=d.data;

    $('status').textContent='🟢 LIVE · video:'+s.video.connected+' gimbal:'+s.gimbal.connected;
    $('debug').textContent='last update: '+new Date().toLocaleTimeString();

    // Attention
    const a=s.attention;const now=Date.now();
    if(a&&a.has_face&&a.score!=null){
      const sc=a.score;
      let lvl,cls,tag;
      if(sc>=70){lvl='✦ 专注';cls='bg-hi';tag='心流状态'}
      else if(sc>=40){lvl='◇ 微澜';cls='bg-md';tag='保持节奏'}
      else{lvl='○ 飘远';cls='bg-lo';tag='深呼吸'}
      $('attnBadge').textContent=lvl;$('attnBadge').className='badge '+cls;
      $('attnTag').textContent=tag;
      $('attnScore').textContent=sc+' 分';
      if(sc>=70){if(!focusStart)focusStart=now}
      else{focusStart=null}
      if(focusStart){const m=Math.floor((now-focusStart)/60000);$('attnDur').textContent=m>0?'已专注 '+m+' 分钟':'刚刚进入专注'}
    }else{
      $('attnBadge').textContent='等待';$('attnBadge').className='badge bg-md';
      $('attnTag').textContent=s.video.connected?'请正对摄像头':'设备未连接';
      $('attnScore').textContent='';$('attnDur').textContent='';focusStart=null;
    }

    // Emotion
    const e=s.emotieff;
    if(e&&e.emotion&&e.probabilities){
      $('emoji').textContent=EMOJI[e.emotion]||'🌸';
      $('emolabel').textContent=ZH[e.emotion]||e.emotion;
      $('emotag').textContent=(e.confidence*100).toFixed(0)+'% confidence';
      $('bars').innerHTML=LABELS.map(l=>{
        const p=e.probabilities[l]||0;const w=Math.round(p*100);
        const is=l===e.emotion;
        return '<div class="row"><span>'+ZH[l]+'</span><span>'+w+'%</span></div>'+
          '<div style="background:#e8d5b7;height:4px;border-radius:2px"><div class="bar" style="width:'+w+'%;opacity:'+(is?1:.4)+'"></div></div>';
      }).join('');
    }else{
      $('emoji').textContent='🌸';$('emolabel').textContent='--';$('emotag').textContent='';
    }
  }catch(err){
    $('debug').textContent='ERROR: '+err.message;
  }
}
poll();setInterval(poll,2500);
</script>
</body></html>
